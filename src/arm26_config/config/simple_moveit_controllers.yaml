# MoveIt Simple Controller Manager configuration
# This is used for connecting MoveIt to ros_control JointTrajectoryControllers
controller_list:
  - name: position_joint_trajectory_controller
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
