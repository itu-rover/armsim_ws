# Joint State Controller - publishes joint states
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50



# Effort Joint Trajectory Controller
effort_joint_trajectory_controller:
  type: effort_controllers/JointTrajectoryController
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
  gains:
    joint1: { p: 1000, d: 50, i: 10, i_clamp: 100 }
    joint2: { p: 5000, d: 200, i: 2000, i_clamp: 5000 }
    joint3: { p: 10000, d: 300, i: 1000, i_clamp: 2000 }
    joint4: { p: 40000, d: 1000, i: 5000, i_clamp: 5000 }
    joint5: { p: 4000, d: 100, i: 200, i_clamp: 500 }
    joint6: { p: 1000, d: 50, i: 50, i_clamp: 100 }
  constraints:
    goal_time: 5.0
    stopped_velocity_tolerance: 1.0
    joint1: { goal: 0.1, trajectory: -1 }
    joint2: { goal: 0.1, trajectory: -1 }
    joint3: { goal: 0.1, trajectory: -1 }
    joint4: { goal: 0.1, trajectory: -1 }
    joint5: { goal: 0.1, trajectory: -1 }
    joint6: { goal: 0.1, trajectory: -1 }

# Position Controller
position_joint_trajectory_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
  constraints:
    goal_time: 10.0
    stopped_velocity_tolerance: 1.0
    joint1: { goal: 0.1, trajectory: 0 }
    joint2: { goal: 0.1, trajectory: 0 }
    joint3: { goal: 0.1, trajectory: 0 }
    joint4: { goal: 0.1, trajectory: 0 }
    joint5: { goal: 0.1, trajectory: 0 }
    joint6: { goal: 0.1, trajectory: 0 }
