# Gazebo controller configuration (for MoveIt controller switching)
controller_list:
  - name: effort_joint_trajectory_controller
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
  - name: position_joint_trajectory_controller
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: false
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
